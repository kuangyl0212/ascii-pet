[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

[coverage:run]
source = pet_core
omit =
    ascii-pet
    ascii-pet-win.py
    build.py
    weather.py
    test_*.py

[coverage:report]
show_missing = True
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
